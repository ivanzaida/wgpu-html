[workspace]
resolver = "2"
members = [
    "crates/wgpu-html",
    "crates/wgpu-html-demo",
    "crates/wgpu-html-devtools",
    "crates/wgpu-html-driver",
    "crates/wgpu-html-driver-bevy",
    "crates/wgpu-html-driver-egui",
    "crates/wgpu-html-driver-winit",
    "crates/wgpu-html-driver-egui",
    "crates/wgpu-html-driver-winit",
    "crates/wgpu-html-events",
    "crates/wgpu-html-layout",
    "crates/wgpu-html-models",
    "crates/wgpu-html-parser",
    "crates/wgpu-html-renderer",
    "crates/wgpu-html-style",
    "crates/wgpu-html-text",
    "crates/wgpu-html-tree",
    "crates/wgpu-html-ui",
    "crates/wgpu-html-ui-demo",
]

[workspace.dependencies]
wgpu-html              = { path = "crates/wgpu-html" }
wgpu-html-devtools     = { path = "crates/wgpu-html-devtools" }
wgpu-html-events       = { path = "crates/wgpu-html-events" }
wgpu-html-layout       = { path = "crates/wgpu-html-layout" }
wgpu-html-models       = { path = "crates/wgpu-html-models" }
wgpu-html-parser       = { path = "crates/wgpu-html-parser" }
wgpu-html-renderer     = { path = "crates/wgpu-html-renderer" }
wgpu-html-style        = { path = "crates/wgpu-html-style" }
wgpu-html-text         = { path = "crates/wgpu-html-text" }
wgpu-html-tree         = { path = "crates/wgpu-html-tree" }
wgpu-html-driver       = { path = "crates/wgpu-html-driver" }
wgpu-html-driver-bevy  = { path = "crates/wgpu-html-driver-bevy" }
wgpu-html-driver-egui  = { path = "crates/wgpu-html-driver-egui" }
wgpu-html-driver-winit = { path = "crates/wgpu-html-driver-winit" }
wgpu-html-ui           = { path = "crates/wgpu-html-ui" }

wgpu     = "29"
winit    = "0.30"
pollster = "0.4"
arboard  = "3"
egui     = "0.33.3"
eframe   = "0.33.3"
bytemuck = { version = "1", features = ["derive"] }
image    = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "bmp", "webp"] }
ureq     = { version = "2", default-features = false, features = ["tls"] }
resvg    = "0.44"

# ── Dev profile: optimize hot crates for usable FPS during development ──
# The demo/app code stays at opt-level 0 for fast incremental compiles,
# but the engine hot path gets opt-level 2 so layout/text/paint run fast.
[profile.dev.package.wgpu-html-layout]
opt-level = 2
[profile.dev.package.wgpu-html-text]
opt-level = 2
[profile.dev.package.wgpu-html-style]
opt-level = 2
[profile.dev.package.wgpu-html]
opt-level = 2
[profile.dev.package.wgpu-html-renderer]
opt-level = 2
[profile.dev.package.cosmic-text]
opt-level = 2
[profile.dev.package.rustybuzz]
opt-level = 2
[profile.dev.package.ttf-parser]
opt-level = 2
[profile.dev.package.image]
opt-level = 2
