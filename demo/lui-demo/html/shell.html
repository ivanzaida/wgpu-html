<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Shell</title>
    <style>
        * {
            box-sizing: border-box;
            scrollbar-width: thin;

        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            background: #12151f;
            color: #eef2ff;
        }

        *::lui-scrollbar {
            width: 4px;
        }

        *::lui-scrollbar-track {
            background-color: #1a1f2e;
        }


        *::lui-scrollbar-thumb {
            background-color: #7b8798;
            border-radius: 2px;
        }

        *::lui-scrollbar-thumb:hover {
            background-color: #2f6fed;
        }

        .shell {
            display: flex;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #12151f;
        }

        .sidebar {
            width: 260px;
            height: 100%;
            overflow-y: auto;
            flex-shrink: 0;
            padding: 16px 12px;
            background: #111827;
            color: #d6deeb;
            border-right: 1px solid #273244;
        }

        .brand {
            padding: 8px 10px 18px;
            margin-bottom: 8px;
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
        }

        .nav-section {
            margin-bottom: 18px;
        }

        .nav-title {
            padding: 8px 10px;
            color: #8996aa;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .nav-item {
            display: block;
            padding: 10px 12px;
            margin: 2px 0;
            color: #d6deeb;
            font-size: 14px;
            border-radius: 6px;
            background: transparent;
        }

        .nav-item.active {
            background: #2f6fed;
            color: #ffffff;
        }

        .nav-item:hover:not(.active) {
            background: #243047;
            color: #ffffff;
        }

        .main {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            min-width: 0;
            background: #12151f;
        }

        .topbar {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: #181d2b;
            border-bottom: 1px solid #273244;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            color: #eef2ff;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .button {
            padding: 8px 12px;
            border-radius: 6px;
            background: #243047;
            color: #d6deeb;
            font-size: 13px;
        }

        .content {
            padding: 24px;
        }


    </style>
</head>
<body>
<div class="shell">
    <aside class="sidebar">
        <div class="brand">LUI</div>

        <div class="nav-section" id="nav-section">
            <div class="nav-title">Examples</div>
        </div>


    </aside>

    <main class="main">
        <div class="topbar">
            <div class="title" id="example-title">Overview</div>
        </div>
        <div class="content" id="content-wrapper">

        </div>
    </main>
</div>
</body>
</html>
