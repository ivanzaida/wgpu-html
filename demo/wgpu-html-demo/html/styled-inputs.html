<style>
    body {
        margin: 0;
        padding: 32px;
        background: #0e0e10;
        color: #ddd;
        font-family: sans-serif;
        font-size: 14px;
    }

    h2 {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: bold;
    }

    .columns {
        display: flex;
        gap: 32px;
    }

    .card {
        padding: 16px;
        border: 1px solid #333;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: 220px;
    }

    label {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .row {
        display: flex;
        gap: 8px;
        align-items: center;
    }

    /* ── Default: no accent-color ── */

    .default input[type="text"] {
        background: #1c1c20;
        color: #ddd;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 8px 10px;
    }

    /* ── Purple ── */

    .purple input[type="checkbox"],
    .purple input[type="radio"] {
        accent-color: #7c3aed;
        border-color: #7c3aed;
    }

    .purple input[type="range"] {
        accent-color: #7c3aed;
        background-color: rgba(124, 58, 237, 0.15);
    }

    .purple input[type="text"] {
        background: #1c1c20;
        color: #ddd;
        border: 1px solid #7c3aed;
        border-radius: 4px;
        padding: 8px 10px;
    }

    /* ── Green ── */

    .green input[type="checkbox"],
    .green input[type="radio"] {
        accent-color: #16a34a;
        border-color: #16a34a;
    }

    .green input[type="range"] {
        accent-color: #16a34a;
        background-color: rgba(22, 163, 74, 0.15);
    }

    .green input[type="text"] {
        background: #1c1c20;
        color: #ddd;
        border: 1px solid #16a34a;
        border-radius: 4px;
        padding: 8px 10px;
    }

    /* ── Rose ── */

    .rose input[type="checkbox"],
    .rose input[type="radio"] {
        accent-color: #e11d48;
        border-color: #e11d48;
    }

    .rose input[type="range"] {
        accent-color: #e11d48;
        background-color: rgba(225, 29, 72, 0.15);
    }

    .rose input[type="text"] {
        background: #1c1c20;
        color: #ddd;
        border: 1px solid #e11d48;
        border-radius: 4px;
        padding: 8px 10px;
    }

    /* ── Amber ── */

    .amber input[type="checkbox"],
    .amber input[type="radio"] {
        accent-color: #d97706;
        border-color: #d97706;
    }

    .amber input[type="range"] {
        accent-color: #d97706;
        background-color: rgba(217, 119, 6, 0.15);
    }

    .amber input[type="text"] {
        background: #1c1c20;
        color: #ddd;
        border: 1px solid #d97706;
        border-radius: 4px;
        padding: 8px 10px;
    }
</style>
