<style>
    body {
        margin: 0;
        padding: 32px;
        background: #0e0e10;
        color: #ddd;
        font-family: sans-serif;
        font-size: 14px;
    }

    h2 {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: bold;
    }

    .columns {
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
    }

    .card {
        padding: 16px;
        border: 1px solid #333;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: 240px;
    }

    label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 12px;
        color: #999;
    }

    input {
        background: #1c1c20;
        color: #ddd;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 8px 10px;
    }

    /* ── Default (dark) ── */

    .default {
        user-select: none;
    }

    /* ── Catppuccin Mocha ── */

    .mocha input::lui-popup {
        background: #1e1e2e;
        border: 1px solid #585b70;
        color: #cdd6f4;
    }
    .mocha input::lui-thumb { background: #cdd6f4; }
    .mocha input::lui-input { background: #181825; border-color: #585b70; }

    /* ── Nord ── */

    .nord input::lui-popup {
        background: #2e3440;
        border: 1px solid #4c566a;
        color: #eceff4;
        border-radius: 8px;
    }
    .nord input::lui-thumb { background: #eceff4; }
    .nord input::lui-input { background: #3b4252; border-color: #4c566a; border-radius: 6px; }

    /* ── Warm (light) ── */

    .warm input[type="color"],
    .warm input[type="date"],
    .warm input[type="datetime-local"] {
        background: #fdf6e3;
        border-color: #d4a373;
        color: #3d2c1e;
    }
    .warm input::lui-popup { background: #fdf6e3; border: 1px solid #d4a373; color: #3d2c1e; }
    .warm input::lui-thumb { background: #3d2c1e; }
    .warm input::lui-input { background: #f5edd6; border-color: #d4a373; }

    /* ── Custom (granular overrides) ── */

    .custom input[type="color"] { border-color: #7c3aed; }
    .custom input[type="color"]::lui-popup {
        background: #120b24;
        border: 2px solid #7c3aed;
        border-radius: 12px;
        color: #c4b5fd;
    }
    .custom input[type="color"]::lui-canvas { width: 200px; height: 200px; }
    .custom input[type="color"]::lui-range { height: 10px; border-radius: 5px; }
    .custom input[type="color"]::lui-thumb { width: 4px; height: 14px; background: #a78bfa; }
    .custom input[type="color"]::lui-input {
        height: 24px; background: #1e1038; border-color: #7c3aed;
        border-radius: 6px; font-size: 12px;
    }

    .custom input[type="date"],
    .custom input[type="datetime-local"] { border-color: #7c3aed; }
    .custom input[type="date"]::lui-popup,
    .custom input[type="datetime-local"]::lui-popup {
        background: #120b24;
        border: 2px solid #7c3aed;
        border-radius: 12px;
        color: #c4b5fd;
        font-size: 11px;
    }
    .custom input::lui-calendar-selected { background: #a78bfa; color: white; }
    .custom input::lui-calendar-today { border-color: #c4b5fd; }
</style>
<div class="columns">

    <div class="card default">
        <h2>Default</h2>
        <label>
            Color
            <input type="color" value="#3b82f6"/>
        </label>
        <label>
            Date
            <input type="date" value="2025-05-09"/>
        </label>
        <label>
            Date + Time
            <input type="datetime-local" value="2025-05-09T14:30"/>
        </label>
    </div>

    <div class="card mocha">
        <h2>Catppuccin Mocha</h2>
        <label>
            Color
            <input type="color" value="#cba6f7"/>
        </label>
        <label>
            Date
            <input type="date" value="2025-05-09"/>
        </label>
        <label>
            Date + Time
            <input type="datetime-local" value="2025-05-09T14:30"/>
        </label>
    </div>

    <div class="card nord">
        <h2>Nord</h2>
        <label>
            Color
            <input type="color" value="#88c0d0"/>
        </label>
        <label>
            Date
            <input type="date" value="2025-05-09"/>
        </label>
        <label>
            Date + Time
            <input type="datetime-local" value="2025-05-09T14:30"/>
        </label>
    </div>

    <div class="card warm">
        <h2>Warm</h2>
        <label>
            Color
            <input type="color" value="#d4a373"/>
        </label>
        <label>
            Date
            <input type="date" value="2025-05-09"/>
        </label>
        <label>
            Date + Time
            <input type="datetime-local" value="2025-05-09T14:30"/>
        </label>
    </div>

    <div class="card custom">
        <h2>Custom (granular)</h2>
        <label>
            Color
            <input type="color" value="#a78bfa"/>
        </label>
        <label>
            Date
            <input type="date" value="2025-05-09"/>
        </label>
        <label>
            Date + Time
            <input type="datetime-local" value="2025-05-09T14:30"/>
        </label>
    </div>

</div>
