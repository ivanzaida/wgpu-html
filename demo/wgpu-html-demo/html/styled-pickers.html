<style>
    body {
        margin: 0;
        padding: 32px;
        background: #0e0e10;
        color: #ddd;
        font-family: sans-serif;
        font-size: 14px;
    }

    h2 {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: bold;
    }

    .columns {
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
    }

    .card {
        padding: 16px;
        border: 1px solid #333;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: 240px;
    }

    label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 12px;
        color: #999;
    }

    input {
        background: #1c1c20;
        color: #ddd;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 8px 10px;
    }

    /* ── Default (dark) ── */

    .default {
        user-select: none;
    }

    /* ── Catppuccin Mocha ── */

    .mocha input[type="color"],
    .mocha input[type="date"],
    .mocha input[type="datetime-local"] {
        border-color: #585b70;
        --lui-popup-background: #1e1e2e;
        --lui-popup-border: 1px solid #585b70;
        --lui-popup-color: #cdd6f4;
        --lui-color-thumb-color: #cdd6f4;
        --lui-color-input-background: #181825;
        --lui-color-input-border-color: #585b70;
    }

    /* ── Nord ── */

    .nord input[type="color"],
    .nord input[type="date"],
    .nord input[type="datetime-local"] {
        border-color: #4c566a;
        --lui-popup-background: #2e3440;
        --lui-popup-border: 1px solid #4c566a;
        --lui-popup-color: #eceff4;
        --lui-popup-border-radius: 8px;
        --lui-color-thumb-color: #eceff4;
        --lui-color-input-background: #3b4252;
        --lui-color-input-border-color: #4c566a;
        --lui-color-input-border-radius: 6px;
    }

    /* ── Warm (light) ── */

    .warm input[type="color"],
    .warm input[type="date"],
    .warm input[type="datetime-local"] {
        background: #fdf6e3;
        border-color: #d4a373;
        color: #3d2c1e;
        --lui-popup-background: #fdf6e3;
        --lui-popup-border: 1px solid #d4a373;
        --lui-popup-color: #3d2c1e;
        --lui-color-thumb-color: #3d2c1e;
        --lui-color-input-background: #f5edd6;
        --lui-color-input-border-color: #d4a373;
    }

    /* ── Custom (granular overrides) ── */

    .custom input[type="color"] {
        border-color: #7c3aed;
        --lui-popup-background: #120b24;
        --lui-popup-border: 2px solid #7c3aed;
        --lui-popup-border-radius: 12px;
        --lui-popup-color: #c4b5fd;
        --lui-color-canvas-width: 200px;
        --lui-color-canvas-height: 200px;
        --lui-color-range-height: 10px;
        --lui-color-range-border-radius: 5px;
        --lui-color-thumb-width: 4px;
        --lui-color-thumb-height: 14px;
        --lui-color-thumb-color: #a78bfa;
        --lui-color-input-height: 24px;
        --lui-color-input-background: #1e1038;
        --lui-color-input-border-color: #7c3aed;
        --lui-color-input-border-radius: 6px;
        --lui-color-input-font-size: 12px;
    }

    .custom input[type="date"],
    .custom input[type="datetime-local"] {
        border-color: #7c3aed;
        --lui-popup-background: #120b24;
        --lui-popup-border: 2px solid #7c3aed;
        --lui-popup-border-radius: 12px;
        --lui-popup-color: #c4b5fd;
        --lui-popup-font-size: 11px;
    }
</style>
<div class="columns">

    <div class="card default">
        <h2>Default</h2>
        <label>
            Color
            <input type="color" value="#3b82f6"/>
        </label>
        <label>
            Date
            <input type="date" value="2025-05-09"/>
        </label>
        <label>
            Date + Time
            <input type="datetime-local" value="2025-05-09T14:30"/>
        </label>
    </div>

    <div class="card mocha">
        <h2>Catppuccin Mocha</h2>
        <label>
            Color
            <input type="color" value="#cba6f7"/>
        </label>
        <label>
            Date
            <input type="date" value="2025-05-09"/>
        </label>
        <label>
            Date + Time
            <input type="datetime-local" value="2025-05-09T14:30"/>
        </label>
    </div>

    <div class="card nord">
        <h2>Nord</h2>
        <label>
            Color
            <input type="color" value="#88c0d0"/>
        </label>
        <label>
            Date
            <input type="date" value="2025-05-09"/>
        </label>
        <label>
            Date + Time
            <input type="datetime-local" value="2025-05-09T14:30"/>
        </label>
    </div>

    <div class="card warm">
        <h2>Warm</h2>
        <label>
            Color
            <input type="color" value="#d4a373"/>
        </label>
        <label>
            Date
            <input type="date" value="2025-05-09"/>
        </label>
        <label>
            Date + Time
            <input type="datetime-local" value="2025-05-09T14:30"/>
        </label>
    </div>

    <div class="card custom">
        <h2>Custom (granular)</h2>
        <label>
            Color
            <input type="color" value="#a78bfa"/>
        </label>
        <label>
            Date
            <input type="date" value="2025-05-09"/>
        </label>
        <label>
            Date + Time
            <input type="datetime-local" value="2025-05-09T14:30"/>
        </label>
    </div>

</div>
