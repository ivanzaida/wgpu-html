<style>
    body {
        margin: 0;
        padding: 32px;
        background-color: #1a1a1a;
        color: white;
        font-family: sans-serif;
    }

    h1 {
        margin: 0 0 16px 0;
        font-size: 24px;
    }

    p {
        margin: 0 0 24px 0;
        color: #aaa;
    }

    #btn {
        display: block;
        padding: 16px 32px;
        background-color: #4a8fe7;
        color: white;
        border: 2px solid #2a6fc7;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
    }

    /* Hover/active variants — exercise :hover and :active in the
       demo so a real user can see state-driven cascade live. */
    #btn:hover {
        background-color: #6aafff;
        border-color: #3a8fe0;
        cursor: pointer;
    }

    #btn:active {
        background-color: #2a6fc7;
    }

    #panel {
        margin-top: 24px;
        padding: 24px;
        background-color: #303030;
        border-radius: 6px;
    }

    #panel:hover {
        background-color: #404040;
    }

    /* Bare-pseudo: every hovered link in the document. Demonstrates
       that pseudo-classes work without a tag/id. */
    :hover {
        /* No-op visually, but proves the parser+matcher accept it. */
    }
</style>

<h1>Interaction demo</h1>
<p>Hover the button to watch :hover fire; click for :active.</p>
<button id="btn">Click me</button>

<div id="panel">
    <p>This panel also listens for hover and click events.</p>
</div>
