<!-- DevTools shell — static structure parsed once, dynamic
     containers (tree-rows, breadcrumb, styles-content) populated
     at runtime by html_gen::build(). -->
<link rel="stylesheet" href="devtools.css">

<div class="toolbar">
    <span class="pick-btn">&#xe202;</span>
    <div class="tb-divider"></div>
    <div class="filter">
        <span class="filter-icon">&#xe0dc;</span>
        <span class="filter-text">Filter</span>
    </div>
</div>

<div class="main">
    <div class="tree-panel">
        <div class="tree-rows" id="tree-rows"></div>
        <div class="breadcrumb" id="breadcrumb"></div>
    </div>
    <div class="styles-panel">
        <div class="tab-bar">
            <div class="tab tab-active" style="height: 100%;">Styles</div>
            <div class="tab" style="height: 100%;">Computed</div>
            <div class="tab" style="height: 100%;">Layout</div>
            <div class="tab" style="height: 100%;">Event Listeners</div>
        </div>
        <div class="style-search">
            <span class="ss-label">Filter</span>
            <div class="ss-spacer"></div>
            <span class="ss-btn ss-btn-active">:hov</span>
            <span class="ss-btn">.cls</span>
            <span class="ss-btn icon">&#xe13d;</span>
        </div>
        <div class="styles-content" id="styles-content"></div>
    </div>
</div>

<script>
    // Mock data for browser preview. Skipped by the Rust renderer
    // which filters out <script> tags. Mirrors the DOM structure
    // that html_gen::emit_node produces at runtime.
    document.addEventListener('DOMContentLoaded', () => {
        const $ = (tag, cls, text) => {
            const el = document.createElement(tag);
            if (cls) el.className = cls;
            if (text) el.textContent = text;
            return el;
        };

        const row = (depth, children, selected) => {
            const r = document.createElement('div');
            r.className = selected ? 'tree-row tree-row-selected' : 'tree-row';
            r.style.paddingLeft = (12 + depth * 16) + 'px';
            children.forEach(c => r.appendChild(c));
            return r;
        };
        const chevron = () => $('span', 'chevron', '\ue06d');
        const openTag = (tag, attrs) => {
            const parts = [$('span', 'bracket', '<'), $('span', 'tag', tag)];
            if (attrs) for (const [k, v] of Object.entries(attrs)) {
                parts.push($('span', 'attr-n', ` ${k}`));
                parts.push($('span', 'bracket', '='));
                parts.push($('span', 'attr-v', `"${v}"`));
            }
            parts.push($('span', 'bracket', '>'));
            return parts;
        };
        const closeTag = (depth, tag) =>
            row(depth, [$('span', 'bracket', '</'), $('span', 'tag', tag), $('span', 'bracket', '>')]);
        const leaf = (depth, tag, attrs, text) => {
            const parts = [...openTag(tag, attrs)];
            if (text) parts.push($('span', 'text-node', text));
            parts.push($('span', 'bracket', '</'), $('span', 'tag', tag), $('span', 'bracket', '>'));
            return row(depth, parts);
        };

        // ── mock tree ───────────────────────────────────────
        const t = document.getElementById('tree-rows');
        t.append(
            row(0, [chevron(), ...openTag('body')]),
              row(1, [chevron(), ...openTag('div', {id: 'app', class: 'container'})]),
                row(2, [chevron(), ...openTag('header', {class: 'header'})]),
                  leaf(3, 'h1', {class: 'logo'}, 'My App'),
                  leaf(3, 'nav', null, '...'),
                closeTag(2, 'header'),
                row(2, [chevron(), ...openTag('main')], true),
                  row(3, [chevron(), ...openTag('section', {class: 'hero'})]),
                    leaf(4, 'h2', null, 'Welcome'),
                    leaf(4, 'p', null, 'Lorem ipsum dolor sit amet...'),
                    leaf(4, 'button', {class: 'btn-primary'}, 'Get Started'),
                  closeTag(3, 'section'),
                  row(3, [chevron(), ...openTag('section', {class: 'features'})]),
                    leaf(4, 'div', {class: 'card'}, 'Feature 1'),
                    leaf(4, 'div', {class: 'card'}, 'Feature 2'),
                    leaf(4, 'div', {class: 'card'}, 'Feature 3'),
                  closeTag(3, 'section'),
                closeTag(2, 'main'),
                row(2, [chevron(), ...openTag('footer')]),
                  leaf(3, 'p', null, '\u00a9 2025 My App'),
                closeTag(2, 'footer'),
              closeTag(1, 'div'),
            closeTag(0, 'body'),
        );

        // ── mock breadcrumb ─────────────────────────────────
        const bc = document.getElementById('breadcrumb');
        ['body', 'div#app.container', 'main'].forEach((label, i, arr) => {
            if (i > 0) bc.appendChild($('span', null, ' \u203a '));
            bc.appendChild($('span', i === arr.length - 1 ? 'bc-active' : 'bracket', label));
        });

        // ── mock styles content ─────────────────────────────
        const sc = document.getElementById('styles-content');
        const makeRule = (selector, decls) => {
            const rule = $('div', 'rule');
            const hdr = $('div', 'rule-header');
            hdr.append($('span', 'selector-text', selector), $('span', 'brace', ' {'));
            rule.appendChild(hdr);
            decls.forEach(([prop, val]) => {
                const d = $('div', 'decl');
                d.append($('div', 'cb'), $('span', 'prop', prop),
                    $('span', 'colon', ': '), $('span', 'val', val), $('span', 'semi', ';'));
                rule.appendChild(d);
            });
            rule.appendChild($('div', 'rule-end', '}'));
            return rule;
        };
        sc.append(
            makeRule('element.style', []),
            makeRule('main', [
                ['display', 'flex'], ['flex-direction', 'column'],
                ['gap', '24px'], ['padding', '32px 16px'],
            ]),
        );
    });
</script>

<script>
    // loading lucide font from ../fonts/lucide.ttf
    const font = new FontFace('Lucide', 'url(../fonts/lucide.ttf)');
    font.load().then(() => {
        document.fonts.add(font);
    })
</script>


<script>
    // handle selection/unselection of a row
    // also handle child clicks
    document.addEventListener('click', e => {
        const target = e.target;
        if (target.classList.contains('tree-row')) {
            const rows = document.querySelectorAll('.tree-row');
            rows.forEach(r => r.classList.remove('tree-row-selected'));
            target.classList.add('tree-row-selected');
        } else if (target.classList.contains('tree-row-child')) {
            target.parentElement.classList.toggle('tree-row-expanded');
        }
    })
</script>


<script>
    // handle DevTools-like item selection
    document.addEventListener('click', e => {
        const target = e.target;
        if (!(target instanceof Element)) return;

        const selectable = target.closest(
            '.tree-row, .rule, .decl, .tab, .ss-btn'
        );

        if (!selectable) return;

        if (selectable.classList.contains('tree-row')) {
            document
                .querySelectorAll('.tree-row-selected')
                .forEach(el => el.classList.remove('tree-row-selected'));

            selectable.classList.add('tree-row-selected');
            return;
        }

        if (selectable.classList.contains('rule')) {
            document
                .querySelectorAll('.rule-selected')
                .forEach(el => el.classList.remove('rule-selected'));

            selectable.classList.add('rule-selected');
            return;
        }

        if (selectable.classList.contains('decl')) {
            document
                .querySelectorAll('.decl-selected')
                .forEach(el => el.classList.remove('decl-selected'));

            selectable.classList.add('decl-selected');
            return;
        }

        if (selectable.classList.contains('tab')) {
            document
                .querySelectorAll('.tab-active')
                .forEach(el => el.classList.remove('tab-active'));

            selectable.classList.add('tab-active');
            return;
        }

        if (selectable.classList.contains('ss-btn')) {
            selectable.classList.toggle('ss-btn-active');
        }
    });
</script>
