<style>
    * {
        box-sizing: border-box;
    }

    body {
        width: 100%;
        margin: 0;
        height: 100vh;
        background-color: #f2f2f5;
        padding: 32px;
    }

    #header {
        height: 64px;
        background-color: #3366d9;
        margin-bottom: 16px;
    }

    #cards {
        display: flex;
        gap: 16px;
    }

    .card {
        width: 320px;
        height: 200px;
        padding: 12px;
        border-radius: 16px;
        border: 2px solid rgba(0, 0, 0, 0.25);
    }

    .highlight {
        height: 40px;
        background-color: rgba(255, 255, 255, 0.35);
        border-radius: 8px;
    }

    #card-red    { background-color: #ec5c5c; }
    #card-green  { background-color: #5cc775; }
    #card-amber  { background-color: #f7bd4d; }
</style>

<body>
    <div id="header"></div>

    <div id="cards">
        <div id="card-red" class="card">
            <div class="highlight"></div>
        </div>

        <div id="card-green" class="card">
            <div class="highlight"></div>
        </div>

        <div id="card-amber" class="card">
            <div class="highlight"></div>
        </div>
    </div>
</body>
