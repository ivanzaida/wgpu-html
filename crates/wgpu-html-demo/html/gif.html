<style>
    body {
        margin: 0;
        font-family: sans-serif;
        background-color: #1a1a1a;
        color: white;
    }

    .label {
        margin: 16px 16px 4px 16px;
        color: #aaa;
        font-size: 14px;
    }

    .row {
        display: flex;
        gap: 16px;
        margin: 0 16px 16px 16px;
        align-items: flex-start;
    }

    .tile {
        width: 200px;
        height: 200px;
        border-radius: 8px;
    }

    .rounded {
        border-radius: 24px;
    }
</style>

<div class="label">Animated GIF — `<img>` intrinsic size</div>
<div class="row">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Rotating_earth_%28large%29.gif">
</div>

<div class="label">Animated GIF — `<img>` resized via HTML width/height attributes</div>
<div class="row">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Rotating_earth_%28large%29.gif" width="120" height="120">
    <img src="https://mathiasbynens.be/demo/animated-webp-supported.webp" width="64" height="64">
</div>

<div class="label">Same GIF as `background-image` — no-repeat, contain, centered, rounded corners</div>
<div class="row">
    <div class="tile rounded" style="background-color: #222; background-image: url('https://upload.wikimedia.org/wikipedia/commons/2/2c/Rotating_earth_%28large%29.gif'); background-repeat: no-repeat; background-size: contain; background-position: center;"></div>
</div>

<div class="label">Same GIF tiled (default repeat)</div>
<div class="row">
    <div class="tile" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/2/2c/Rotating_earth_%28large%29.gif'); background-size: 64px 64px;"></div>
</div>
