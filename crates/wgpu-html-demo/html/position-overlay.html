<style>
  body {
    margin: 0;
    padding: 32px;
    background-color: #f3f4f6;
    color: #111827;
    font-family: DemoSans, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.4;
  }

  h1 {
    margin: 0 0 18px;
    font-size: 28px;
    font-weight: bold;
  }

  .stage {
    width: 620px;
    height: 320px;
    position: relative;
    padding: 24px;
    border: 2px solid #0f172a;
    border-radius: 8px;
    background-color: #ffffff;
  }

  .card {
    width: 330px;
    height: 170px;
    position: relative;
    padding: 18px;
    border: 2px solid #2563eb;
    border-radius: 8px;
    background-color: #dbeafe;
  }

  .card h2 {
    margin: 0 0 8px;
    font-size: 20px;
    font-weight: bold;
  }

  .card p {
    margin: 0;
    color: #1e3a8a;
  }

  .absolute-fill {
    position: absolute;
    inset: 0;
    background-color: rgba(20, 184, 166, 0.20);
    border: 3px solid #14b8a6;
  }

  .badge {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    background-color: #111827;
    color: #ffffff;
    font-weight: bold;
  }

  .relative-note {
    position: relative;
    top: 18px;
    left: 28px;
    width: 260px;
    margin-top: 18px;
    padding: 10px;
    border: 2px solid #f97316;
    background-color: #ffedd5;
  }

  .normal-after {
    width: 260px;
    height: 40px;
    margin-top: 18px;
    padding: 10px;
    background-color: #dcfce7;
    border: 2px solid #16a34a;
  }

  .fixed-toast {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 210px;
    padding: 14px;
    border: 2px solid #7c3aed;
    border-radius: 8px;
    background-color: #ede9fe;
    color: #4c1d95;
  }
</style>

<h1>Position Overlay Demo</h1>

<div class="stage">
  <div class="card">
    <div class="absolute-fill"></div>
    <h2>Relative parent</h2>
    <p>
      The teal absolute layer uses inset: 0 and should fill this card's padding box.
    </p>
    <div class="badge">absolute</div>
  </div>

  <div class="relative-note">
    This box is position: relative and visually shifted.
  </div>

  <div class="normal-after">
    This normal-flow box should keep the original flow slot.
  </div>
</div>

<div class="fixed-toast">
  Fixed overlay anchored to the viewport bottom-right.
</div>
