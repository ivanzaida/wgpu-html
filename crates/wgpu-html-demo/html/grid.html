<style>
    body {
        margin: 0;
        font-family: sans-serif;
        background-color: #1a1a1a;
        color: white;
    }

    /* Holy-grail layout: header / sidebar+main+aside / footer. */
    .holy-grail {
        display: grid;
        grid-template-columns: 200px 1fr 200px;
        grid-template-rows: 60px 200px 40px;
        gap: 8px;
        margin: 12px;
        padding: 8px;
        border-radius: 6px;
        background-color: #2a2a2a;
    }
    .hg-header {
        grid-column: 1 / 4;
        background-color: #4a8fe7;
        border-radius: 4px;
    }
    .hg-sidebar { background-color: #4ae78f; border-radius: 4px; }
    .hg-main    { background-color: #e7e74a; border-radius: 4px; }
    .hg-aside   { background-color: #e74a8f; border-radius: 4px; }
    .hg-footer {
        grid-column: 1 / 4;
        background-color: #4a8fe7;
        border-radius: 4px;
    }

    /* Photo gallery: 4 equal-width columns, fixed gap, 2 rows from
       8 items via auto-flow. */
    .gallery {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: 90px;
        gap: 12px;
        margin: 12px;
        padding: 8px;
        border-radius: 6px;
        background-color: #2a2a2a;
    }
    .photo { background-color: #4a8fe7; border-radius: 4px; }
    .photo-alt { background-color: #e74a8f; border-radius: 4px; }

    /* Auto-flow demo: row vs column packing. */
    .flow-row {
        display: grid;
        grid-template-columns: 100px 100px 100px;
        grid-auto-rows: 60px;
        gap: 6px;
        margin: 12px;
        padding: 8px;
        border-radius: 6px;
        background-color: #2a2a2a;
    }
    .flow-col {
        display: grid;
        grid-auto-flow: column;
        grid-template-rows: 60px 60px 60px;
        grid-auto-columns: 100px;
        gap: 6px;
        margin: 12px;
        padding: 8px;
        border-radius: 6px;
        background-color: #2a2a2a;
    }
    .cell { background-color: #4ae78f; border-radius: 4px; }
    .cell-wide  { grid-column: span 2; background-color: #e7e74a; }
    .cell-tall  { grid-row: span 2; background-color: #e74a8f; }
</style>

<div class="holy-grail">
    <div class="hg-header"></div>
    <div class="hg-sidebar"></div>
    <div class="hg-main"></div>
    <div class="hg-aside"></div>
    <div class="hg-footer"></div>
</div>

<div class="gallery">
    <div class="photo"></div>
    <div class="photo-alt"></div>
    <div class="photo"></div>
    <div class="photo-alt"></div>
    <div class="photo-alt"></div>
    <div class="photo"></div>
    <div class="photo-alt"></div>
    <div class="photo"></div>
</div>

<div class="flow-row">
    <div class="cell cell-wide"></div>
    <div class="cell"></div>
    <div class="cell cell-tall"></div>
    <div class="cell"></div>
    <div class="cell"></div>
</div>

<div class="flow-col">
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
</div>
