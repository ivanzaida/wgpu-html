<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; color: #333; }
  .container { max-width: 960px; margin: 0 auto; padding: 16px; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #ddd; }
  .logo { font-size: 20px; }
  nav { color: #666; }
  main { display: flex; flex-direction: column; gap: 24px; padding: 24px 0; }
  .hero { text-align: center; padding: 32px; background: #f0f4ff; border-radius: 8px; }
  .hero h2 { font-size: 28px; margin-bottom: 8px; }
  .hero p { color: #666; margin-bottom: 16px; }
  .btn-primary { padding: 8px 24px; background: #3b82f6; color: #fff; border: none; border-radius: 4px; font-size: 14px; }
  .features { display: flex; gap: 16px; }
  .card { flex: 1; padding: 16px; background: #fafafa; border: 1px solid #eee; border-radius: 6px; }
  footer { padding: 12px 0; border-top: 1px solid #ddd; color: #999; font-size: 12px; }
</style>

<body>
  <div id="app" class="container">
    <header class="header">
      <h1 class="logo">My App</h1>
      <nav>Home | About | Contact</nav>
    </header>
    <main>
      <section class="hero">
        <h2>Welcome</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        <button class="btn-primary">Get Started</button>
      </section>
      <section class="features">
        <div class="card">Feature 1</div>
        <div class="card">Feature 2</div>
        <div class="card">Feature 3</div>
      </section>
    </main>
    <footer>
      <p>&copy; 2025 My App</p>
    </footer>
  </div>
</body>
